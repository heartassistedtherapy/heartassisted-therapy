title: "Heart-Assisted Therapy (Groetjes Bram)"

what_is_hat: |
  Je bent hartelijk uitgenodigd voor de opleiding in de H.A.T. (Heart Assisted Therapy).

  H.A.T. is een verrassend eenvoudige en effectieve methode in het veld van de psychotherapie. Het helpt emotionele verstoringen relatief snel en blijvend loslaten.

  Er wordt gebruik gemaakt van een combinatie van elementen, zoals 'awareness' (een stroom van associatieve ervaringen), de kracht van de taal, focusing op lichaamsgewaarwordingen, mindfullness en last but not least de energie van het hart. Doel is stabilisatie van emoties, cognities en lichaamssensaties, maar ook verwerking van psychotrauma , angsten, depressie e.d.. De vernieuwende rol van de hart-brein-connectie en van de lichaam/geest-verbinding speelde een sleutelrol in de ontwikkeling van de HAT.

  Dit model is een aanvulling op alle bestaande psycho-therapeutische oriëntaties. John Diepold, psycholoog bracht elementen samen uit de verschillende methoden, die hij in de loop van zijn 30-jarige ervaring geleerd heeft en die hij verwerkte tot een evenwichtig geheel.

  HAT is een zachte en gebruiksvriendelijke benadering, zowel voor therapeut als cliënt. Ze kan gemakkelijk geleerd worden door elke ervaren psychotherapeut.

  Deze methode is erop gericht om uw therapeutische luister-, observatie- en integratie-vaardigheden te activeren en maximaliseren. Ook worden er procedures gebruikt die de cliënt in staat stellen om te verwerken, patronen te veranderen en zichzelf verder te ontwikkelen.

  H.A.T. is geen therapie-richting op zich, maar leent zich als interventie tot een vlotte integratie in het elk therapeutisch werkkader dat door de behandelaar wordt gehanteerd.

  In de opleiding wordt theoretische uitleg afgewisseld met video's en veel praktische oefeningen om het protocol te leren gebruiken. Dit leidt tot een nieuwe vaardigheid, een tool als psychotherapeut.

  We organiseren deze opleiding samen met enkele collega's-psychologen.

  Collegiale groeten,

  Walter De Jongh, klinisch psycholoog, Kalmthout

origin_title: "Hoe het begon : oorsprong van de H.A.T."

origin_text: |
  Ik leerde John Diepold kennen in 2005 tijdens een seminarie in Utrecht. Wat mij opviel, was zijn originele manier om aan psychotherapie te doen. Fascinerend vond ik vooral zijn manier van kijken naar psychologische evolutie. Hoewel John heel wat theorieën uit de psychologie in zijn achterhoofd heeft, behoudt hij de nieuwsgierigheid van een kind. Het is zoals een kunstenaar, die naar de wereld kijkt vanuit een onbevangen verwondering.

  Deze bijna kinderlijke nieuwsgierigheid gaf hem de inspiratie om zijn nieuwe methode te ontwikkelen. Hij heeft een echte ontdekking gedaan: de energie van het hart hanteren in het therapeutisch proces. Bovendien integreerde hij als psycholoog zijn rijke kennis van 30 jaar uit meerdere psychotherapeutische methoden om een uitgebalanceerde werkwijze te ontwikkelen.

fundamenten: |
  De ontdekking van de hart-brein-connectie was dè sleutel tot de ontwikkeling van de H.A.T. John Diepold werkte eerst jarenlang met 'klassieke' psychotherapeutische methoden : cognitieve therapie, experiëntieel (Carl Rogers), Gestalttherapie, Focusing (Gendlin), en met de hypnose van Milton Erickson, mindfullness, EMDR en ook TFT (Thought Field Therapy).

  Maar… toen hij het hart betrok in het psychotherapeutisch proces, ontstond er opeens een nieuwe dynamiek bij zijn cliënten. Hij ondervond dat, toen hij de handen kruiselings op het hart liet leggen, het proces van de cliënt kon verdiepen en bevorderen. Dit betekende een doorbraak en tegelijk een paradigma-shift.

